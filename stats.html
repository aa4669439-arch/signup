<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>報名統計</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #F6F5FA;
    --card: #FFFFFF;
    --primary: #5B3E96;
    --primary-dark: #46307A;
    --ink: #26203A;
    --muted: #767090;
    --line: #E5E2EF;
    --bar-bg: #EEEBF6;
    --err: #C0392B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 60px;
    display: flex;
    justify-content: center;
  }
  .wrap { width: 100%; max-width: 860px; }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 18px;
  }
  .header .org { font-size: 12px; letter-spacing: 3px; color: var(--muted); margin-bottom: 4px; }
  .header h1 { font-family: 'Noto Serif TC', serif; font-weight: 900; font-size: 26px; color: var(--primary-dark); }
  .actions { display: flex; gap: 8px; }
  .actions button {
    font: inherit; font-size: 14px; font-weight: 500;
    padding: 8px 16px;
    border-radius: 10px;
    border: 1px solid var(--primary);
    background: #fff;
    color: var(--primary);
    cursor: pointer;
    transition: background .15s;
  }
  .actions button:hover { background: #F2EEFA; }
  .actions button.primary { background: var(--primary); color: #fff; }
  .actions button.primary:hover { background: var(--primary-dark); }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
  }
  .stat-card .label { font-size: 13px; color: var(--muted); }
  .stat-card .value { font-family: 'Noto Serif TC', serif; font-weight: 900; font-size: 34px; color: var(--primary); margin-top: 4px; }
  .stat-card .value small { font-size: 15px; font-weight: 600; color: var(--muted); margin-left: 4px; }

  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 18px;
  }
  .panel h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; letter-spacing: 1px; }

  .bar-row { display: grid; grid-template-columns: 110px 1fr 48px; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 14px; }
  .bar-row .dept-name { text-align: right; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { background: var(--bar-bg); border-radius: 999px; height: 20px; overflow: hidden; }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary) 0%, #8A6BC4 100%);
    border-radius: 999px;
    width: 0;
    transition: width .6s ease;
  }
  .bar-row .num { font-weight: 700; color: var(--primary-dark); }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 9px 10px; border-bottom: 1px solid var(--line); text-align: left; }
  th { color: var(--muted); font-weight: 500; font-size: 13px; white-space: nowrap; }
  tr:hover td { background: #FAF8FD; }
  td.num-col, th.num-col { width: 44px; color: var(--muted); }
  .del-btn {
    font: inherit; font-size: 12px;
    color: var(--err);
    background: none;
    border: 1px solid #EAC6C1;
    border-radius: 8px;
    padding: 3px 10px;
    cursor: pointer;
  }
  .del-btn:hover { background: #FBF0EE; }
  .empty { text-align: center; color: var(--muted); padding: 30px 0; font-size: 14px; }
  .status { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .table-scroll { overflow-x: auto; }
  @media (max-width: 560px) {
    .bar-row { grid-template-columns: 84px 1fr 40px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="org">佳里奇美醫院　醫療服務組</div>
      <h1>報名統計</h1>
    </div>
    <div class="actions">
      <button onclick="load()">🔄 重新整理</button>
      <button class="primary" onclick="exportExcel()">⬇ 匯出 Excel</button>
    </div>
  </div>

  <div class="cards">
    <div class="stat-card">
      <div class="label">總報名人數</div>
      <div class="value" id="totalCount">–<small>人</small></div>
    </div>
    <div class="stat-card">
      <div class="label">參與部門數</div>
      <div class="value" id="deptCount">–<small>個</small></div>
    </div>
    <div class="stat-card">
      <div class="label">最新報名</div>
      <div class="value" id="latestTime" style="font-size:18px; line-height:1.5;">–</div>
    </div>
  </div>

  <div class="panel">
    <h2>各部門報名人數</h2>
    <div id="bars"><div class="empty">載入中…</div></div>
  </div>

  <div class="panel">
    <h2>完整報名名單</h2>
    <div class="status" id="status"></div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th class="num-col">#</th><th>姓名</th><th>部門／單位</th>
            <th>電話／分機</th><th>Email</th><th>備註</th><th>報名時間</th><th></th>
          </tr>
        </thead>
        <tbody id="tbody"><tr><td colspan="8" class="empty">載入中…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ========= 只要改這一個地方 =========
const API_URL = 'https://script.google.com/macros/s/XXXXXXXX/exec'; // ← 換成你的 Apps Script /exec 網址
// ====================================

let signups = [];

function fmtTime(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

async function load() {
  document.getElementById('status').textContent = '載入中…';
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    if (!data.success) throw new Error(data.error || '讀取失敗');
    signups = data.signups || [];
    render();
    document.getElementById('status').textContent = `資料更新時間：${fmtTime(new Date().toISOString())}`;
  } catch (e) {
    document.getElementById('status').textContent = '讀取失敗：' + e.message + '（請確認 API_URL 是否正確）';
  }
}

function render() {
  // 總覽卡片
  document.getElementById('totalCount').innerHTML = signups.length + '<small>人</small>';
  const deptMap = {};
  signups.forEach(s => { deptMap[s.dept] = (deptMap[s.dept] || 0) + 1; });
  document.getElementById('deptCount').innerHTML = Object.keys(deptMap).length + '<small>個</small>';
  const latest = signups.length ? signups[signups.length - 1] : null;
  document.getElementById('latestTime').textContent = latest ? fmtTime(latest.time) : '–';

  // 部門長條圖
  const bars = document.getElementById('bars');
  const entries = Object.entries(deptMap).sort((a, b) => b[1] - a[1]);
  if (!entries.length) {
    bars.innerHTML = '<div class="empty">目前還沒有人報名</div>';
  } else {
    const max = entries[0][1];
    bars.innerHTML = entries.map(([dept, n]) => `
      <div class="bar-row">
        <div class="dept-name">${esc(dept)}</div>
        <div class="bar-track"><div class="bar-fill" data-w="${(n / max * 100).toFixed(1)}"></div></div>
        <div class="num">${n} 人</div>
      </div>`).join('');
    requestAnimationFrame(() => {
      bars.querySelectorAll('.bar-fill').forEach(el => el.style.width = el.dataset.w + '%');
    });
  }

  // 名單表格（新的在上面）
  const tbody = document.getElementById('tbody');
  if (!signups.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">目前還沒有人報名</td></tr>';
    return;
  }
  tbody.innerHTML = signups.slice().reverse().map((s, i) => `
    <tr>
      <td class="num-col">${signups.length - i}</td>
      <td>${esc(s.name)}</td>
      <td>${esc(s.dept)}</td>
      <td>${esc(s.phone)}</td>
      <td>${esc(s.email)}</td>
      <td>${esc(s.note)}</td>
      <td>${fmtTime(s.time)}</td>
      <td><button class="del-btn" onclick="del('${s.id}')">刪除</button></td>
    </tr>`).join('');
}

function esc(str) {
  return (str || '').replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

async function del(id) {
  const target = signups.find(s => s.id === id);
  if (!target) return;
  if (!confirm(`確定要刪除「${target.dept} ${target.name}」的報名資料嗎？`)) return;
  const key = prompt('請輸入管理密碼：');
  if (key === null) return;
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'delete', id: id, key: key })
    });
    const data = await res.json();
    if (data.success) { signups = data.signups; render(); }
    else alert(data.error || '刪除失敗');
  } catch (e) {
    alert('連線失敗，請稍後再試');
  }
}

function exportExcel() {
  if (!signups.length) { alert('目前沒有報名資料'); return; }

  // 工作表 1：完整名單
  const listRows = signups.map((s, i) => ({
    '序號': i + 1,
    '姓名': s.name,
    '部門／單位': s.dept,
    '電話／分機': s.phone,
    'Email': s.email,
    '備註': s.note,
    '報名時間': fmtTime(s.time)
  }));
  const ws1 = XLSX.utils.json_to_sheet(listRows);
  ws1['!cols'] = [{wch:6},{wch:12},{wch:16},{wch:20},{wch:26},{wch:26},{wch:18}];

  // 工作表 2：部門統計
  const deptMap = {};
  signups.forEach(s => { deptMap[s.dept] = (deptMap[s.dept] || 0) + 1; });
  const statRows = Object.entries(deptMap).sort((a, b) => b[1] - a[1])
    .map(([dept, n]) => ({ '部門／單位': dept, '報名人數': n }));
  statRows.push({ '部門／單位': '總計', '報名人數': signups.length });
  const ws2 = XLSX.utils.json_to_sheet(statRows);
  ws2['!cols'] = [{wch:18},{wch:10}];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws1, '報名名單');
  XLSX.utils.book_append_sheet(wb, ws2, '部門統計');
  const today = new Date();
  const p = n => String(n).padStart(2, '0');
  XLSX.writeFile(wb, `報名統計_${today.getFullYear()}${p(today.getMonth()+1)}${p(today.getDate())}.xlsx`);
}

load();
</script>
</body>
</html>
